repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npm run format
        language: system
        pass_filenames: false

      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        pass_filenames: false
